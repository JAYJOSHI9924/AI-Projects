<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Chatbot</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  linear-gradient(135deg,#0f172a,#111827,#1e1b4b);
  overflow:hidden;
}

/* Animated Background */

body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#2563eb;
  filter:blur(180px);
  top:-150px;
  left:-100px;
  opacity:0.4;
}

body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:#7c3aed;
  filter:blur(180px);
  bottom:-150px;
  right:-100px;
  opacity:0.4;
}

/* Chat Container */

.chat-container{
  position:relative;
  width:420px;
  height:700px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:
  0 8px 32px rgba(0,0,0,0.35);
}


/*voice input*/

.mic-btn{
  width:46px;
  height:46px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:18px;
  background:linear-gradient(135deg,#ff004c,#ff7a00);
  color:white;
  transition:0.3s;
}

.mic-btn:hover{
  transform:scale(1.08);
}

/* Header */

.chat-header{
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
}

.bot-avatar{
  width:52px;
  height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:22px;
  font-weight:700;
}

.header-info h2{
  color:white;
  font-size:20px;
}

.header-info p{
  color:#cbd5e1;
  font-size:13px;
}

/* Chat Box */

.chat-box{
  flex:1;
  padding:20px;
  overflow-y:auto;
  scroll-behavior:smooth;
}

.chat-box::-webkit-scrollbar{
  width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
  background:#475569;
  border-radius:10px;
}

/* Messages */

.message{
  max-width:80%;
  padding:14px 18px;
  margin-bottom:18px;
  border-radius:18px;
  line-height:1.7;
  animation:fadeIn 0.3s ease;
  word-wrap:break-word;
  font-size:15px;
  white-space: pre-wrap;
}
.user{
  margin-left:auto;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  border-bottom-right-radius:5px;
  box-shadow:0 4px 15px rgba(37,99,235,0.4);
}

.bot{
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.08);
  border-bottom-left-radius:5px;
}

/* Typing */

.typing{
  display:flex;
  align-items:center;
  gap:5px;
}

.typing span{
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  animation:bounce 1s infinite;
}

.typing span:nth-child(2){
  animation-delay:0.2s;
}

.typing span:nth-child(3){
  animation-delay:0.4s;
}

/* Input Area */

.chat-input{
  padding:18px;
  display:flex;
  gap:12px;
  border-top:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
}

.chat-input input{
  flex:1;
  border:none;
  outline:none;
  padding:15px 18px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:15px;
}

.chat-input input::placeholder{
  color:#cbd5e1;
}

.chat-input button{
  border:none;
  width:58px;
  border-radius:15px;
  cursor:pointer;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  font-size:22px;
  transition:0.3s;
}

.chat-input button:hover{
  transform:scale(1.08);
}

/* Animation */

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes bounce{
  0%,80%,100%{
    transform:scale(0);
    opacity:0.5;
  }
  40%{
    transform:scale(1);
    opacity:1;
  }
}

/* Mobile */

@media(max-width:500px){

  .chat-container{
    width:100%;
    height:100vh;
    border-radius:0;
  }

}

</style>
</head>

<body>

<div class="chat-container">

  <!-- Header -->

  <div class="chat-header">

    <div class="bot-avatar">
      AI
    </div>

    <div class="header-info">
      <h2>AI Assistant</h2>
      <p>Always here to help!</p>
    </div>

  </div>

  <!-- Chat Messages -->

  <div class="chat-box" id="chatBox">

    <div class="message bot">
      Hello 👋<br>
      How can I help you today?
    </div>

  </div>

  <!-- Input -->

<div class="chat-input">

  <input
  type="text"
  id="userInput"
  placeholder="Type your message...">

  <button class="mic-btn"
  onclick="startVoice()">

  🎤

  </button>

  <button onclick="sendMessage()">
    ➤
  </button>

</div>
<script>

const API_KEY = "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";

const chatBox =
  document.getElementById("chatBox");

const userInput =
  document.getElementById("userInput");

function addMessage(text,sender){

  const msg =
    document.createElement("div");

  msg.classList.add("message");
  msg.classList.add(sender);
  msg.innerHTML = text.replace(/\n/g, "<br>");

  chatBox.appendChild(msg);

  chatBox.scrollTop =
    chatBox.scrollHeight;

  return msg;
}

function showTyping(){

  const typing =
    document.createElement("div");

  typing.classList.add("message","bot");

  typing.id = "typing";

  typing.innerHTML = `
    <div class="typing">
      <span></span>
      <span></span>
      <span></span>
    </div>
  `;

  chatBox.appendChild(typing);

  chatBox.scrollTop =
    chatBox.scrollHeight;
}

function removeTyping(){

  const typing =
    document.getElementById("typing");

  if(typing){
    typing.remove();
  }
}

async function sendMessage(){

  const text =
    userInput.value.trim();

  if(!text) return;

  addMessage(text,"user");

  userInput.value = "";

  showTyping();

  try{

    const response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {

        method:"POST",

        headers:{
          "Content-Type":"application/json",
          "Authorization":
          `Bearer ${API_KEY}`
        },

        body:JSON.stringify({

          model:"llama-3.3-70b-versatile",

          messages:[
            {
              role:"system",
              content:
              "You are a helpful AI assistant."
            },
            {
              role:"user",
              content:text
            }
          ]

        })

      }
    );

    const data =
      await response.json();

    removeTyping();

    const reply =
      data.choices[0].message.content;

    addMessage(reply,"bot");

  }
  catch(error){

    removeTyping();

    addMessage(
      "⚠ Error connecting to AI",
      "bot"
    );

    console.log(error);
  }
}

userInput.addEventListener(
  "keypress",
  function(e){

    if(e.key === "Enter"){
      sendMessage();
    }

  }
);
function startVoice() {

  const recognition =
    new(window.SpeechRecognition ||
        window.webkitSpeechRecognition)();

  recognition.lang = "en-US";

  recognition.start();

  recognition.onstart = () => {

    showToast("🎤 Listening...", "success");

  };

  recognition.onresult = (event) => {

    const transcript =
      event.results[0][0].transcript;

    document.getElementById("userInput").value =
      transcript;

    sendMessage();
  };

  recognition.onerror = () => {

    showToast("Voice recognition failed", "error");

  };
}
</script>

</body>
</html>
